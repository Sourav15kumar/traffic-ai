<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    background:#0f2027;
    color:white;
    text-align:center;
    font-family:'Poppins',sans-serif;
}

/* HEADER */
h1 {
    margin-top:20px;
    font-size:28px;
}

/* CARD */
.dashboard {
    width:90%;
    max-width:500px;
    margin:30px auto;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* CANVAS FIX */
canvas {
    width:100% !important;
    height:auto !important;
}

/* BUTTON */
.btn {
    padding:10px 20px;
    background:linear-gradient(135deg,#ff9800,#ff5722);
    border:none;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
    color:white;
    transition:0.3s;
    margin-top:15px;
}

.btn:hover {
    transform:scale(1.05);
    box-shadow:0 5px 15px rgba(255,152,0,0.5);
}

/* MOBILE OPTIMIZATION */
@media (max-width:600px) {

    h1 {
        font-size:22px;
    }

    .dashboard {
        padding:15px;
    }

    .btn {
        width:80%;
    }
}
</style>
</head>

<body>

<h1>📊 Traffic Dashboard</h1>

<div class="dashboard">
<canvas id="chart"></canvas>
</div>

<button class="btn" onclick="location.href='/'">⬅ Back</button>

<script>
new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
        labels:["Low","Medium","High"],
        datasets:[{
            label:"Traffic",
            data:[3,5,2],
            backgroundColor:["green","orange","red"]
        }]
    },
    options:{
        responsive:true,
        maintainAspectRatio:false,
        scales:{
            y:{
                beginAtZero:true
            }
        }
    }
});
</script>

</body>
</html>
